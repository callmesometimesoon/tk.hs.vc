<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>@badport</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: black;
        color: white;
        font-family: monospace;
        font-size: 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
</style>
</head>

<body>

@badport

<audio id="bg-audio" src="grenade.mp3" autoplay loop></audio>

<script>
    // Browsers block autoplay with sound until user interacts
    document.addEventListener("click", () => {
        const audio = document.getElementById("bg-audio");
        audio.play();
    }, { once: true });
</script>

</body>
</html>
